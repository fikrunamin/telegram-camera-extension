<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camera</title>
  <link rel="stylesheet" href="camera-page.css">
</head>
<body>
  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <div id="status">Memuat kamera…</div>
  </div>

  <div id="controls">
    <button id="cancel" class="btn btn-secondary" type="button">Batal</button>
    <button id="shutter" type="button" aria-label="Ambil foto"></button>
    <button id="mirror" class="btn-mirror" type="button" title="Cermin (mirror)" aria-label="Mirror">⇋</button>
  </div>

  <script src="camera-page.js"></script>
</body>
</html>
